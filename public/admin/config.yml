backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Páginas Web"
    files:
      - label: "Página de Inicio"
        name: "home"
        file: "src/content/home.json"
        fields:
          - {label: "Sección Inicio (Hero)", name: "hero", widget: "object", fields: [
              {label: "Título Principal", name: "title", widget: "string"},
              {label: "Subtítulo / Bajada", name: "subtitle", widget: "text"}
            ]}
          - {label: "Sección Nosotros", name: "about", widget: "object", fields: [
              {label: "Texto de la Misión", name: "mission", widget: "text"},
              {label: "Texto de la Visión", name: "vision", widget: "text"},
              {label: "Imagen de Nosotros", name: "image", widget: "image"}
            ]}
          - {label: "Sección Servicios", name: "services", widget: "list", fields: [
              {label: "Icono (Emoji)", name: "icon", widget: "string"},
              {label: "Título del Servicio", name: "title", widget: "string"},
              {label: "Descripción", name: "description", widget: "text"}
            ]}
          - {label: "Sección de Contacto / WhatsApp", name: "contact", widget: "object", fields: [
              {label: "Título de CTA", name: "title", widget: "string"},
              {label: "Descripción de CTA", name: "description", widget: "text"},
              {label: "Número de WhatsApp (Ej: 51983140402 sin espacios ni +)", name: "whatsappNumber", widget: "string"}
            ]}
